semantic-release:
  needs:
    - job: check-build-web
      optional: false

  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: "0"  # необходимо, чтобы semantic-release видел всю историю
    GITLAB_TOKEN: $SEMANTIC_RELEASE_TOKEN
    UV_VERSION: "0.8.0"
    UV_CACHE_DIR: ".uv_cache"
    PYTHON_VERSION: "3.12"
    BASE_LAYER: "alpine"

  stage: semantic-release
  tags:
    - release
  image: ghcr.io/astral-sh/uv:$UV_VERSION-python$PYTHON_VERSION-$BASE_LAYER

  before_script:
    - |
      apk add --no-cache git
      git config --global user.email "${GIT_AUTHOR_EMAIL}"
      git config --global user.name "${GIT_AUTHOR_NAME}"
      git checkout "$CI_COMMIT_BRANCH"
      git remote set-url origin "https://${CI_REGISTRY_USER}:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      git fetch --tags
      uv pip install python-semantic-release
  script:
    - |
      echo "➡️ Запуск Semantic Release..."
      echo "🚀 Начинаем выпуск новой версии приложения..."
      uv run semantic-release version
      echo "✅ Выпуск новой версии приложения завершен!"
      echo "🔖 Публикация новой версии приложения..."
      uv run semantic-release publish
      echo "✅ Публикация новой версии приложения завершена!"

  cache:
    key:
      files:
        - uv.lock
    paths:
      - .venv/
      - $UV_CACHE_DIR/
    policy: pull-push
    when: on_success
    untracked: false

  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - src/monitoring/**/*
        - Dockerfile
      when: on_success